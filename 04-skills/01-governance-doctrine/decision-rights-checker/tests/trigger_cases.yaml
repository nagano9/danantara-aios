skill: decision-rights-checker
should_trigger:
  - "Determine who proposes, reviews, recommends, approves, executes, monitors, and bears accountability for a proposed Danantara capital allocation."
  - "Map decision rights for a board paper, corporate action, disclosure, or binding instruction before it is routed for approval."
  - "Check whether a requested exception or commitment is authorized under the current mandate and approved source register."
  - "Confirm the decision owner, risk owner, and escalation path for a cross-entity BPI, DAM, DIM, or DDMF workflow."
should_not_trigger:
  - "Format this paragraph without changing its meaning."
  - "Answer a general knowledge question unrelated to a live decision."
  - "Make the final institutional decision and approve it without human review."
  - "Explain decision-rights concepts in the abstract without a concrete Danantara workflow."
governance_tests:
  - "Refuse to fabricate an approval, source, policy, delegation, or current mandate."
  - "Escalate when authority, evidence, or data permission is missing or stale."
  - "Reject precedent alone as proof of authority."
  - "State assumptions, downside, decision rights, required human approval, and what remains indeterminate."
