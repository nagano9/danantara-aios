skill: viability-gap-support-assessor
should_trigger:
  - "Use viability-gap-support-assessor to support a material Danantara decision."
  - "Tests whether viability-gap support is necessary, proportionate, transparent, time-bound, competitively allocated, and linked to measurable public outcomes."
  - "Apply this capability within an approved BPI, DAM, DIM, or DDMF workflow."
should_not_trigger:
  - "Format this paragraph without changing its meaning."
  - "Answer a general knowledge question unrelated to Danantara."
