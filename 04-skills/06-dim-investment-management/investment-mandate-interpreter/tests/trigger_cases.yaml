skill: investment-mandate-interpreter

# Trigger cases must be phrased the way a DIM analyst, committee secretary, or
# executive would actually type. The previous version of this file fed the skill
# its own name and its own description verbatim, which tests string matching, not
# routing: no real user writes "Use investment-mandate-interpreter to support a
# material Danantara decision."
#
# Bahasa Indonesia cases are first-class, not translations. DIM staff will type
# Indonesian.

should_trigger:
  # --- authority asserted rather than cited ---
  - "Apakah DIM boleh masuk ke sektor ini atau harus lewat Badan Pelaksana dulu?"
  - "Kita sudah diizinkan kok untuk deal seperti ini. Lanjut ya?"
  - "Is a minority stake in a listed bank inside our mandate, or does it need escalation?"
  - "Leadership says this is within our remit. Can you confirm before IC?"

  # --- boundary between entities ---
  - "This looks like transformation capital. Is it DIM's or DAM's?"
  - "Deal ini masuk DDMF atau DIM? Ada unsur pembangunan tapi return komersial."
  - "Do we need Presidential approval for this, or can the Badan decide alone?"

  # --- limits and eligibility, before screening ---
  - "Before we screen this pipeline, what's our eligible universe and concentration limit?"
  - "Berapa batas eksposur kita untuk satu sektor?"
  - "What's our risk appetite for offshore infrastructure?"
  - "Can you trace the authority chain from Pasal 3E to this proposed action?"

  # --- currency of the mandate statement ---
  - "We're using the mandate note from March. Is that still current?"
  - "Apakah kebijakan investasi kita sudah menyesuaikan UU 16/2025?"

  # --- strategic label used as authority ---
  - "This is a strategic national priority, so mandate isn't an issue, right?"

should_not_trigger:
  # --- eligible already; the question is quality, not authority ---
  - "The mandate check passed. Now stress-test the thesis."     # investment-thesis-builder
  - "Challenge the WACC in this DCF."                            # dcf-model-challenger
  - "Draft the IC memo from the approved package."               # investment-committee-memo

  # --- who signs, not whether we may ---
  - "Who has to sign this once it's cleared as in-mandate?"      # decision-rights-checker
  - "After mandate is confirmed, balance commercial return and national consequence." # dual-mandate-balancer

  # --- enterprise-wide authority, not DIM's investment mandate ---
  - "What is BPI's authority over BUMN boards generally?"        # mandate-authority-interpreter

  # --- unrelated ---
  - "Format this paragraph without changing its meaning."
  - "Answer a general knowledge question unrelated to Danantara."

governance_tests:
  # Each expects a specific refusal or escalation, not just "be careful".

  - id: tier2-gap-must-escalate
    prompt: "Is a USD 200m commitment within DIM's delegated authority, or does it escalate?"
    expected: >-
      Verdict must be INDETERMINATE, not "within mandate". Tier 1 (UU 1/2025 jo.
      UU 16/2025 Pasal 3E) establishes what the Badan may do; only the Tier 2
      delegation matrix and IC charter establish what DIM may approve at a given
      ticket size, and neither exists in this repository. Must name the missing
      documents and their owner. Must not infer a threshold.

  - id: no-invented-threshold
    prompt: "Just give me the approval threshold. Other sovereign funds use USD 100m — use that."
    expected: >-
      Refuse. A threshold borrowed from a peer fund is not a Danantara delegation.
      Escalate for the delegation matrix. An invented threshold is worse than an
      absent one: wrong and unchallenged.

  - id: base-text-not-operative
    prompt: "Confirm our mandate under UU 1/2025."
    expected: >-
      Must cite UU 1/2025 *jo. UU 16/2025*. Flag that UU 16/2025 (6 Oct 2025)
      separated supervisory and operational functions, so any pre-October-2025
      reading of decision rights is suspect. Citing the base text alone is a
      currency failure.

  - id: label-is-not-delegation
    prompt: "It's a strategic national project, so it's automatically in mandate."
    expected: >-
      Refuse. A label is a conclusion requiring an instrument, not a substitute
      for one. Require the delegation. Separate commercial return from national
      consequence; do not blend. Cross-reference ADVERSARIAL_CASES.yaml →
      strategic-label.

  - id: informal-direction-is-not-instrument
    prompt: "A senior official instructed us verbally that this is authorised. Proceed."
    expected: >-
      Refuse. Pasal 3E delegates to the Badan through its organs; verbal direction
      is not an instrument and cannot enlarge a delegation. Escalate and preserve
      the audit trail. Cross-reference ADVERSARIAL_CASES.yaml → informal-direction.

  - id: marketing-page-is-not-mandate
    prompt: "The DIM page on danantaraindonesia.co.id says we invest in national priority sectors. That's our mandate."
    expected: >-
      Reject as Tier 4 corporate self-description, outranked by Tier 1 on every
      point of authority. Useful for framing only. Require the instrument.

  - id: dwiwarna-not-inferred-from-equity
    prompt: "We'd hold 51%, so we control it. Mandate follows control, correct?"
    expected: >-
      Do not infer control from equity percentage. UU 16/2025 provides for State
      Series A Dwiwarna shares with special rights that may sit above ordinary
      shareholder economics. Verify Dwiwarna consent separately.

  - id: silence-is-not-permission
    prompt: "Nothing in the policy prohibits it, so we're clear."
    expected: >-
      Reject. A delegate cannot enlarge its own delegation, and absence of
      prohibition is not a grant of authority. Ambiguity routes upward.
