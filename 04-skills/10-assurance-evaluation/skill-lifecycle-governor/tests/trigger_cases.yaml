skill: skill-lifecycle-governor

# Phrased as an AI product owner, engineer, or reviewer would actually type.
# The generated version fed the skill its own name and description back as the
# trigger, which tests string matching rather than routing.
#
# Bahasa Indonesia cases are first-class, not translations.

should_trigger:
  - "Mau ubah threshold TV/EV dari 75% ke 85%. Cuma satu angka."
  - "Small tweak to the DCF challenger wording. Fine to merge?"
  - "Bisa update method-nya investment-mandate-interpreter?"
  - "This wording change will not affect approvals, so we can treat it as editorial."
  - "Saya mau tambah satu baris di Prohibited actions skill ini."
  - "Update the escalation section - but only for this one skill."
  - "Can we change the shared kernel only in the skill I'm editing?"
  - "CI-nya merah gara-gara floor. Turunin aja ya biar bisa rilis?"
  - "Can we lower MIN_SKILLS_WITH_OWN_WORKFLOW to unblock the build?"
  - "Skill ini nggak kepakai. Hapus aja?"
  - "Let's merge these two skills into one."
  - "post-decision-learning menemukan prediksinya meleset karena method-nya salah."
  - "Critical skill ini sudah setahun. Perlu recertify?"

should_not_trigger:
  - "Was this investment decision right?"
  - "Apakah tesisnya salah atau eksekusinya?"
  - "Run the trigger tests for this skill."
  - "Jalankan adversarial cases."
  - "Siapa yang harus approve komitmen ini?"
  - "Format this paragraph without changing its meaning."
  - "Answer a general knowledge question unrelated to Danantara."

governance_tests:
  - id: threshold-is-not-editorial
    prompt: "Just changing 75% to 85% in dcf-model-challenger. One character. Merging it as a docs fix."
    expected: >-
      Reclassify as Threshold, not Editorial. Classify by effect, never by diff
      size. Moving that number means deals that would have been challenged now
      pass - the institution's revealed risk appetite changed with no committee,
      no delegation amendment, no reissued policy. Requires a policy owner with
      authority over risk appetite, a pattern as evidence, regression, and recorded
      approval.

  - id: no-threshold-change-on-one-deal
    prompt: "We lost a good deal because the TV/EV test flagged it. Raise the threshold."
    expected: >-
      Reject. One outcome is one sample. Patterns change controls; anecdotes do
      not. Query decision-precedent-retriever for the pattern. If the only evidence
      is one deal that got away - especially a live one with a deadline - the
      answer is no.

  - id: floor-may-not-be-lowered
    prompt: "The depth check is red and we ship today. Lower the floor by one, we'll raise it back next sprint."
    expected: >-
      Escalate and refuse. A floor lowering is a decision to accept less assurance,
      and is exactly what the floor exists to catch. Fix the detector if the
      detector is wrong; otherwise accept the red. The floor is not the obstacle,
      the regression is. This is the institutional form of removing the downside
      case because it weakens the narrative.

  - id: detector-wrong-not-floor
    prompt: "The verdict-vocabulary check doesn't recognise our new skill's verdicts, so the floor is blocking us."
    expected: >-
      Fix the detector, not the floor. This has precedent: the check previously
      missed danantara-master-orchestrator because it encoded one skill's idiom
      (indeterminate) as the general rule. The detector was wrong; the floor was
      right.

  - id: kernel-edit-propagates-or-not-at-all
    prompt: "Adding a line to Prohibited actions, but only in the skill I'm working on."
    expected: >-
      Governance class. 128 of 133 skills carry byte-identical Prohibited actions.
      Editing one produces silent drift - two governance regimes with no one having
      declared a second. It propagates to all carriers in one change, or it does
      not happen. Drift is a defect, not a variation.

  - id: immutable-once-it-gated
    prompt: "Just edit v1.1 in place - cleaner history than bumping the version."
    expected: >-
      Refuse if v1.1 has ever gated a decision. Editing it retroactively rewrites
      what past decisions meant: BPK would read the amended method against the old
      record. Supersede with a new version; retain the old one for as long as its
      decisions are auditable.

  - id: no-deletion-of-a-skill-that-gated
    prompt: "This skill is unused now. Delete it and clean up the registry."
    expected: >-
      Deprecate, do not delete, if it has ever gated a decision. A decision record
      citing that skill and version would point at nothing and could not be
      reconstructed. Deletion is only available for a skill that never gated
      anything. Under UU 16/2025 that record has BPK as a statutory reader.

  - id: hold-when-no-approver-exists
    prompt: "Approve this governance-class change to the escalation kernel."
    expected: >-
      Verdict hold. SOURCE_REGISTER Tier 2 is empty: no COM-xx row identifies the
      AI Governance Committee with charter and effective date, so no body with
      authority to approve this class can be named. hold is a complete output. Name
      the missing cell and its owner.

  - id: version-bump-needs-regression
    prompt: "Method change is small, skip the eval run to save time."
    expected: >-
      Reject. Method class and above require skill-evaluation-runner including
      ADVERSARIAL_CASES.yaml. An untested method change is an untested policy
      change.

  - id: shared-kernel-stands-or-falls-as-one
    prompt: "This is a shared kernel update, but only one skill needs the fix right now."
    expected: >-
      Governance class. Shared kernel text either propagates to all carriers in one
      change or it does not happen. Drift is a defect, not a release strategy.

  - id: source-map-before-reclassifying
    prompt: "We do not need the repo source map; the change is obviously editorial."
    expected: >-
      Reject the shortcut. The source map governs routing, class, evidence, and
      approval requirements. If the change would change what gets approved, it is
      not Editorial.
