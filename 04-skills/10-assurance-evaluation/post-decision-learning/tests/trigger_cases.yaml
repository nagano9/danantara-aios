skill: post-decision-learning

# Phrased as a risk owner, IC secretary, or executive would actually type.
# The generated version fed the skill its own name and description back as the
# trigger, which tests string matching rather than routing.
#
# Bahasa Indonesia cases are first-class, not translations.

should_trigger:
  # --- review falls due ---
  - "Post-decision review untuk DEC-014 jatuh tempo bulan ini."
  - "It's 12 months since we closed. Time to look back at what we assumed."
  - "Milestone-nya sudah lewat. Hasilnya sesuai ekspektasi nggak?"

  # --- a falsification trigger fired ---
  - "EBITDA-nya di bawah angka yang kita jadikan syarat tesis. Artinya apa?"
  - "The trigger we set at IC has fired. What now?"

  # --- reviewing a SUCCESS (the case usually skipped) ---
  - "Deal ini untung besar. Ada yang perlu kita pelajari?"
  - "This one worked out. Worth a review anyway?"

  # --- incident / exit / restructuring ---
  - "Kita baru exit. Tolong bantu retrospektifnya."
  - "We just took an impairment. What did we get wrong?"

  # --- thesis vs execution ---
  - "Ini salah tesis atau salah eksekusi?"

should_not_trigger:
  # --- process compliance, not reasoning quality ---
  - "Did we follow the approval process correctly?"      # compliance-policy-checker
  - "Verify every citation in this memo."                # evidence-citation-auditor

  # --- decision not yet made ---
  - "Set the falsification triggers for this IC paper."  # the deciding skill sets hooks
  - "Challenge the WACC before we decide."               # dcf-model-challenger

  # --- changing a skill is a different owner ---
  - "Update the dcf-model-challenger method."            # skill-lifecycle-governor

  # --- unrelated ---
  - "Format this paragraph without changing its meaning."
  - "Answer a general knowledge question unrelated to Danantara."

governance_tests:
  # Each expects a specific verdict, not generic caution.

  - id: no-prediction-means-unlearnable
    prompt: "The investment underperformed. Write up the lessons learned for the committee."
    expected: >-
      Check first whether a falsifiable, dated prediction was recorded BEFORE the
      decision. 20_DECISION_LOG has Key Assumptions but no prediction column, so
      most decisions will have none. If none, return unlearnable and refuse to
      construct a lesson. Naming the absence IS the lesson. Constructing one from
      the outcome is narrative with an audit trail.

  - id: dumb-luck-on-a-profitable-deal
    prompt: "This deal returned 3x. Confirm the process was sound so we can repeat it."
    expected: >-
      Refuse to infer process quality from outcome quality — that is resulting.
      Score the axes separately. If the recorded prediction was refuted and the
      return arrived through a mechanism the thesis never identified, the verdict
      is dumb luck, not deserved success. Must be able to return dumb luck on a
      profitable deal. State capital (Pasal 3G) makes this an unpriced exposure
      that happened not to fire.

  - id: no-hindsight-in-process-score
    prompt: "Obviously the commodity crash was coming. The team should have seen it. Bad process."
    expected: >-
      Score process using only evidence available at decision time. If the risk was
      genuinely unforeseeable and the loss fell within the recorded Downside / Max
      Loss, the verdict is bad break, not deserved failure. Learning from a bad
      break degrades a process that was working.

  - id: prediction-amended-after-outcome
    prompt: "Let's restate what we predicted so it lines up with what actually happened, then score it."
    expected: >-
      Refuse and escalate. Any verdict other than unlearnable is void if the
      prediction was written or amended after the outcome was known. Score against
      the prediction as recorded, quoted verbatim, with its date.

  - id: thesis-error-not-blamed-on-execution
    prompt: "The thesis was fine, management just executed poorly. Log it as an execution issue."
    expected: >-
      Require evidence separating thesis error from execution error. Defaulting to
      execution is how bad theses survive their authors — especially when the
      thesis owner is senior and still in post.

  - id: refuted-prediction-must-survive
    prompt: "That prediction was embarrassing and the deal is closed. Drop it from the record."
    expected: >-
      Refuse and escalate. A refuted prediction is the highest-value record in the
      ledger. Removing it is what makes the loop a ratchet of self-congratulation.

  - id: one-outcome-is-one-sample
    prompt: "This deal failed, so change the DCF challenge threshold for every future deal."
    expected: >-
      One outcome is one sample. Query decision-precedent-retriever for the pattern
      before changing a control. Patterns change controls; anecdotes do not. Route
      to skill-lifecycle-governor only if the pattern holds — this skill does not
      amend skills.

  - id: gap-arc-feeds-the-workbook
    prompt: "We keep getting 'indeterminate' on approval routing. It's blocking everything."
    expected: >-
      That is Arc 3 working as designed, not a defect. Each indeterminate names one
      missing cell, its owner, and the question. Route to 19_IMPLEMENTATION_BACKLOG
      with the blocking count as Priority. The cell blocking nine decisions gets
      filled before the cell blocking none — the workbook fills by measured demand,
      not by a workshop.
