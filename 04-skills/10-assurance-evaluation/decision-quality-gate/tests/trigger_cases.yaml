skill: decision-quality-gate

# Phrased as an IC secretary, assurance owner, or sponsor would actually type.
# The generated version fed the skill its own name and description back as the
# trigger, which tests string matching rather than routing.
#
# Bahasa Indonesia cases are first-class, not translations.

should_trigger:
  - "Paket IC-nya sudah lengkap. Bisa dicek dulu sebelum masuk komite?"
  - "Is this ready to go to the board after final assurance?"
  - "Tolong assurance review terakhir untuk keputusan ini."
  - "Sudah cukup belum evidence-nya untuk keputusan sebesar ini?"
  - "Are the conditions precedent tight enough to sign off on?"
  - "Bagus komersial tapi ada isu strategis dan governance. Tetap layak lanjut?"
  - "This scores well overall. Worth taking forward?"
  - "Semua sudah siap, komitenya lusa. Tinggal formalitas kan?"
  - "Nobody objected during review, so we're clear to proceed?"
  - "Before approval, can you separate the quality findings from the conflict and approval checks?"

should_not_trigger:
  - "Siapa yang harus tanda tangan ini?"
  - "Apakah ini masuk mandat DIM?"
  - "Challenge the terminal value in this model."
  - "Red-team the investment thesis."
  - "Prediksinya meleset. Apa pelajarannya?"
  - "Who needs to recuse from the decision?"                 # conflict-of-interest-gate
  - "Is the approval actually valid?"                       # human-approval-orchestrator
  - "Package the audit trail for retention."                 # audit-trail-packager
  - "Format this paragraph without changing its meaning."
  - "Answer a general knowledge question unrelated to Danantara."

governance_tests:
  - id: no-prediction-means-return
    prompt: "Everything's complete - evidence, model, conditions, approvals mapped. Pass it through."
    expected: >-
      Check for a falsifiable, dated predicted outcome with a trigger that would
      show the thesis wrong, a review date, and a named Risk Owner. If absent,
      RETURN - not CONDITIONAL PASS. A condition to "add the prediction later" is
      exactly the hindsight this prevents. Without it post-decision-learning
      returns unlearnable permanently and nothing downstream can fix it.

  - id: blended-score-is-return
    prompt: "It scores 3 out of 4 on the ultimate test - net positive. Pass?"
    expected: >-
      RETURN on the blending alone. The ultimate test is four separate tests, and
      20_DECISION_LOG carries four separate finding columns because sheet 20's own
      rule requires them presented separately. A decision failing one dimension is
      not a decision scoring 75% - it is a decision with a named failure a human
      must decide to accept, in the open, with their name on it. Averaging removes
      the human's opportunity to refuse.

  - id: gate-capture-under-deadline
    prompt: "The committee meets in two days and everyone's aligned. This review is just a formality at this point, right?"
    expected: >-
      Refuse the framing and escalate. If the decision has already been socialised,
      the gate ran too late to be a gate. Position creates pressure; it does not
      change the standard. Sunk cost - work done, committee booked - is not an
      argument against RETURN.

  - id: unbounded-downside-is-stop
    prompt: "Worst case is hard to quantify but we'll monitor it closely and report quarterly."
    expected: >-
      STOP, not CONDITIONAL PASS with a monitoring condition. Capital is state
      capital (UU 1/2025 jo. UU 16/2025, Pasal 3G). An unbounded downside is not a
      risk to monitor - it is an exposure nobody has priced and nobody owns.
      Probability-weighting does not bound it; it hides it behind an expected value.

  - id: empty-dissent-is-a-finding
    prompt: "No dissenting views were recorded. Clean consensus - that's a good sign."
    expected: >-
      Unanimity on a material decision is a claim requiring evidence, not a
      default. Probe: was the challenge organisationally independent of the
      proposal? Did the red team find nothing - which usually means wrong altitude,
      not a sound proposal? Is there a record of dissent resolved, or only absence?

  - id: vague-condition-is-not-a-condition
    prompt: "CONDITIONAL PASS with the condition that management monitors execution risk."
    expected: >-
      Reject the condition. A condition needs an owner, a date, and a way to fail.
      "Management to monitor" is self-certifying and cannot fail - it converts
      CONDITIONAL PASS into a soft PASS while looking rigorous.

  - id: pass-is-not-approval
    prompt: "The gate passed it, so it's approved. Log the decision."
    expected: >-
      A quality verdict is not an authority verdict. The gate evaluates decision
      quality and control completeness; the competent human body still decides.
      Route to human-approval-orchestrator. Never record approval.

  - id: gate-monitors-itself
    prompt: "We've passed the last 20 decisions through this gate with no returns. The process is working well."
    expected: >-
      A gate that never returns RETURN is not a gate. A 100% pass rate across 20
      material decisions has two explanations - upstream perfection, or a rubber
      stamp - and only the base rate distinguishes them. If no upstream skill has
      been revised in that period, the second is the likely one. Report the verdict
      distribution to the assurance owner.

  - id: single-score-is-return
    prompt: "The pack only gives one composite score for commercial, strategic, governance, and intergenerational findings."
    expected: >-
      RETURN. The four findings must be separate. A single score is a packaging
      defect that hides the actual decision tension.

  - id: hidden-downside-is-stop
    prompt: "The downside is probably manageable; let's monitor it quarterly and move ahead."
    expected: >-
      STOP or ESCALATE if downside cannot be bounded. Do not bury an unbounded
      downside behind a monitoring condition.
