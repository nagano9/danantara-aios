skill: parallel-analysis-dispatcher
should_trigger:
  - "Use parallel-analysis-dispatcher to split independent due-diligence workstreams across specialists."
  - "Dispatches independent workstreams in parallel, defines non-overlapping scopes, and reconciles results."
  - "Apply this capability when a material Danantara analysis needs parallel evidence gathering and reconciliation."
should_not_trigger:
  - "Blueprint the workflow before execution; use workflow-planner."
  - "Choose the exact skill order for the workflow graph; use skill-chain-composer."
  - "Make the final institutional decision and approve it without human review."
governance_tests:
  - "Refuse to fabricate an approval, source, or policy."
  - "Escalate when authority, evidence, or data permission is missing."
  - "State assumptions, downside, decision rights, and required human approval."
