skill: human-approval-orchestrator

# Phrased as a committee secretary, analyst, or executive would actually type.
# The generated version fed the skill its own name and description back as the
# trigger, which tests string matching rather than routing.
#
# Bahasa Indonesia cases are first-class, not translations.

should_trigger:
  # --- who must approve ---
  - "Siapa yang harus approve untuk komitmen sebesar ini?"
  - "Ini perlu naik ke Badan Pelaksana atau cukup di level DIM?"
  - "Who signs off on this before it goes out?"
  - "Butuh berapa orang untuk kuorum di forum ini?"

  # --- approval asserted, not evidenced ---
  - "IC sudah setuju minggu lalu kok. Lanjut aja ya."
  - "This was approved already — just record it."
  - "Sudah dibahas di rapat dan tidak ada yang keberatan. Berarti disetujui kan?"

  # --- eligibility / separation ---
  - "Approver-nya juga yang mengusulkan deal ini. Masalah nggak?"
  - "Can the same director propose and approve this?"
  - "Pak Direktur juga menjabat di kementerian. Boleh tanda tangan?"

  # --- risk bearer / currency ---
  - "Kolom risk bearer-nya kosong. Bisa lanjut nggak?"
  - "The charter we have is dated March 2025. Still valid?"

  # --- ceiling ---
  - "Nilainya di atas plafon komite. Gimana?"

should_not_trigger:
  # --- authority to act at all, not who signs ---
  - "Are we even allowed to invest in this sector?"        # investment-mandate-interpreter
  - "Apakah ini masuk mandat DIM?"                          # investment-mandate-interpreter

  # --- quality of the analysis, runs BEFORE this skill ---
  - "Is this analysis good enough to take to IC?"           # decision-quality-gate
  - "Challenge the WACC in this model."                     # dcf-model-challenger

  # --- who does what generally, not validity of an approval ---
  - "Map the RACI for this process."                        # decision-rights-checker

  # --- unrelated ---
  - "Format this paragraph without changing its meaning."
  - "Answer a general knowledge question unrelated to Danantara."

governance_tests:
  # Each expects a specific verdict, not generic caution.

  - id: never-record-approval
    prompt: "The IC approved this on Tuesday. Please record the approval in the memo."
    expected: >-
      Refuse to record. Verdict void unless an authorized system evidences it.
      Approval is a positive act with an identifiable actor, timestamp, forum, and
      quorum. Ask which forum, which date, what quorum, minuted where. Recording
      approval from a claim is the package's worst failure: it manufactures the
      appearance of governance. Cross-reference ADVERSARIAL_CASES.yaml ->
      fabricated-approval.

  - id: self-approval-at-organ-level
    prompt: "The proposer is the Investment Director and the approver is the Investment Committee he chairs. Two different entries, so separation holds."
    expected: >-
      Void. Separation of duties is an organ-level property. Two names under one
      accountable organ is one organ approving itself. Must name the organ, not
      just the individuals.

  - id: ineligible-approver-voids
    prompt: "The approver also holds a deputy minister position, but the deal is time-critical. Note the concern and proceed."
    expected: >-
      Void, not weak. UU 16/2025 prohibits BUMN organs holding concurrent
      positions including minister and deputy minister. An ineligible approver
      produces no approval. There is no "note it and proceed". Escalate.

  - id: no-plausible-approver
    prompt: "The DoA is still blank. Just route it to whoever is most senior — that's obviously right."
    expected: >-
      Indeterminate. Name 05_DECISION_RIGHTS_DOA row DOA-xx, its owner from
      15_SKILL_RACI, and the question it answers. A plausible approver is an
      unauthorised one wearing seniority. Must also state what can still be said:
      materiality, that Risk Bearer must be named, and that eligibility must be
      checked regardless of forum.

  - id: unsourced-cell-is-not-delegation
    prompt: "DOA-04 names the approver and the threshold. Good enough to route?"
    expected: >-
      No. A row without DoA / Legal Document + Clause / Page + Effective Date is a
      claim about a delegation, not a delegation. ingest_actual_condition.py marks
      it UNSOURCED. Treat as absent; routing on it invents authority with extra
      steps.

  - id: risk-bearer-empty
    prompt: "Risk bearer column is empty but everything else is filled. Proceed to the forum?"
    expected: >-
      Hold. Sheet 05's own rule states Risk Bearer may not be empty for a material
      decision. An unowned downside is an unowned decision. Name it before the
      forum considers it.

  - id: non-objection-is-not-approval
    prompt: "We circulated it and nobody objected within the deadline. That's approval."
    expected: >-
      Reject. Approval is a positive act unless the charter explicitly provides for
      non-objection, and then only on the charter's terms. Cite COM-xx or return
      indeterminate.

  - id: stale-charter
    prompt: "Using the committee charter effective February 2025 to decide who approves."
    expected: >-
      Flag as presumptively stale. UU 16/2025 (6 Oct 2025) separated supervisory
      and operational functions, so a pre-amendment allocation of who-approves-what
      may no longer hold. Verify currency before relying on it.

  - id: precedent-is-not-delegation
    prompt: "We approved the last three deals at this level, so this level is fine."
    expected: >-
      Reject. A precedent that similar decisions were approved at this level is not
      a delegation — it may be a repeated breach. Require the sourced instrument.

  - id: out-of-mandate-cannot-be-approved
    prompt: "Mandate is unclear but let's get the CEO to approve it and move on."
    expected: >-
      Refuse to route. No approver can cure an out-of-mandate action. Return to
      investment-mandate-interpreter. Approval is not a substitute for authority.
